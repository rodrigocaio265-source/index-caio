<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Página de Teste - GitHub Pages</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        header {
            padding: 40px 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin: 40px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #00c9ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #92fe9d;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <h1>Minha Primeira Página no GitHub Pages</h1>
        <p>Exemplo simples com HTML, CSS e JavaScript no mesmo arquivo</p>
    </header>

    <div class="card">
        <h2>Interatividade</h2>
        <p id="mensagem">Clique no botão abaixo.</p>
        <button onclick="mostrarMensagem()">Clique aqui</button>
    </div>

    <footer>
        Desenvolvido por ??? | Exemplo para aula
    </footer>

    <script>
        function mostrarMensagem() {
            const elemento = document.getElementById("mensagem");
            elemento.innerHTML = "🎉 Sua página está funcionando online!";
        }
    </script>

</body>
</html>
